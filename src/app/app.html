

<section id="contenedor">
<form id="login-container" (ngSubmit)="login()">
  <p id="title-login">LOGIN</p>
  <input type="text" [(ngModel)]="usuario" name="usuario" placeholder="Usuario" required>
  <input type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required>
  
  <button type="submit">Iniciar sesión</button>
  <button type="button" (click)="register()">Registrar</button>

  <p id="msg_login" *ngIf="mensaje">{{ mensaje }}</p>

</form>



</section>
